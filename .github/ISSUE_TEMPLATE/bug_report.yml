name: Bug Report
description: Report a bug in ai-armor
labels: [bug]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the information below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to reproduce the behavior, or a minimal reproduction.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: ai-armor version
      placeholder: e.g., 0.1.0
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - ai-armor (core)
        - '@ai-armor/nuxt'
    validations:
      required: true
