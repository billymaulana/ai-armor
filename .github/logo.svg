<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 440" fill="none">
  <!-- AI ARMOR — Clean shield + AIA monogram -->
  <!-- Design: monochrome-first, no gradients, geometric precision -->

  <!-- Shield outline -->
  <path d="M180 32
           C128 32 78 42 44 58
           C38 61 34 68 35 76
           L48 272
           C56 344 108 392 180 428
           C252 392 304 344 312 272
           L325 76
           C326 68 322 61 316 58
           C282 42 232 32 180 32Z"
        fill="#22d3ee"/>

  <!-- Shield inner (cutout) -->
  <path d="M180 52
           C134 52 90 60 62 74
           L74 268
           C80 334 126 376 180 408
           C234 376 280 334 286 268
           L298 74
           C270 60 226 52 180 52Z"
        fill="#09090b"/>

  <!-- Letter A (left) -->
  <path d="M120 148
           L80 348
           L100 348
           L108 312
           L148 312
           L140 348
           L160 348
           L140 148Z
           M112 296
           L128 200
           L144 296Z"
        fill="#22d3ee" fill-rule="evenodd"/>

  <!-- Letter I (center) — clean vertical bar -->
  <rect x="170" y="148" width="20" height="200" rx="2" fill="#22d3ee"/>
  <!-- I serifs -->
  <rect x="162" y="148" width="36" height="12" rx="2" fill="#22d3ee"/>
  <rect x="162" y="336" width="36" height="12" rx="2" fill="#22d3ee"/>

  <!-- Letter A (right) -->
  <path d="M240 148
           L200 348
           L220 348
           L228 312
           L268 312
           L260 348
           L280 348
           L260 148Z
           M232 296
           L248 200
           L264 296Z"
        fill="#22d3ee" fill-rule="evenodd"/>
</svg>
