<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!--
    ai-armor logo v9
    Shield + Sword + AA — refined proportions, balanced symmetry, cleaner traces
  -->
  <defs>
    <linearGradient id="sf" x1="256" y1="64" x2="256" y2="482" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#101830"/>
      <stop offset="100%" stop-color="#080C18"/>
    </linearGradient>
  </defs>

  <!-- Shield outer -->
  <path d="M176 66 L336 66 Q420 70 418 104 L406 316 Q370 438 256 480 Q142 438 106 316 L94 104 Q92 70 176 66 Z"
        fill="url(#sf)" stroke="#00E5FF" stroke-width="8" stroke-linejoin="round"/>

  <!-- Shield inner accent -->
  <path d="M190 80 L322 80 Q404 84 402 112 L392 310 Q360 426 256 464 Q152 426 120 310 L110 112 Q108 84 190 80 Z"
        fill="none" stroke="rgba(0,229,255,0.18)" stroke-width="2.5"/>

  <!-- Circuit traces — left (6 traces, cleaner than v8) -->
  <g stroke="rgba(0,229,255,0.22)" stroke-width="1.5" fill="none">
    <path d="M104 174 L138 174"/>
    <path d="M100 212 L140 212 L150 202"/>
    <path d="M96 250 L130 250"/>
    <path d="M130 250 L130 266"/>
    <path d="M98 284 L134 284 L142 274"/>
    <path d="M102 316 L126 316"/>
    <path d="M112 346 L134 346"/>
  </g>
  <!-- Circuit traces — right -->
  <g stroke="rgba(0,229,255,0.22)" stroke-width="1.5" fill="none">
    <path d="M408 174 L374 174"/>
    <path d="M412 212 L372 212 L362 202"/>
    <path d="M416 250 L382 250"/>
    <path d="M382 250 L382 266"/>
    <path d="M414 284 L378 284 L370 274"/>
    <path d="M410 316 L386 316"/>
    <path d="M400 346 L378 346"/>
  </g>
  <!-- Circuit nodes -->
  <g fill="rgba(0,229,255,0.30)">
    <circle cx="104" cy="174" r="3.5"/>
    <circle cx="100" cy="212" r="3.5"/>
    <circle cx="96" cy="250" r="3.5"/>
    <circle cx="130" cy="266" r="2.5"/>
    <circle cx="98" cy="284" r="3.5"/>
    <circle cx="102" cy="316" r="3.5"/>
    <circle cx="112" cy="346" r="3"/>
    <circle cx="408" cy="174" r="3.5"/>
    <circle cx="412" cy="212" r="3.5"/>
    <circle cx="416" cy="250" r="3.5"/>
    <circle cx="382" cy="266" r="2.5"/>
    <circle cx="414" cy="284" r="3.5"/>
    <circle cx="410" cy="316" r="3.5"/>
    <circle cx="400" cy="346" r="3"/>
  </g>

  <!-- Sword pommel (diamond) -->
  <path d="M256 12 L272 34 L256 56 L240 34 Z" fill="#00E5FF"/>
  <!-- Sword grip -->
  <rect x="250" y="56" width="12" height="26" rx="2" fill="#00E5FF"/>
  <!-- Sword crossguard — beveled -->
  <path d="M206 97 L222 88 L222 108 L206 99 Z" fill="#00E5FF"/>
  <rect x="222" y="88" width="68" height="20" rx="4" fill="#00E5FF"/>
  <path d="M306 97 L290 88 L290 108 L306 99 Z" fill="#00E5FF"/>
  <!-- Sword blade (thinner, more elegant) -->
  <path d="M250 108 L250 458 L256 480 L262 458 L262 108 Z" fill="#00E5FF"/>
  <!-- Blade center line -->
  <line x1="256" y1="128" x2="256" y2="454" stroke="#080C18" stroke-width="1.5" opacity="0.3"/>

  <!-- Left A (perfectly symmetric legs: 34px each) -->
  <polygon points="182,128 130,370 164,370" fill="#00E5FF"/>
  <polygon points="182,128 200,370 234,370" fill="#00E5FF"/>
  <rect x="138" y="270" width="88" height="24" rx="3" fill="#00E5FF"/>

  <!-- Right A (mirrored, 74px from center = 330) -->
  <polygon points="330,128 278,370 312,370" fill="#00E5FF"/>
  <polygon points="330,128 348,370 382,370" fill="#00E5FF"/>
  <rect x="286" y="270" width="88" height="24" rx="3" fill="#00E5FF"/>
</svg>
