<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Diamond-shaped shield -->
  <path d="M100 10 L185 80 L100 190 L15 80Z" fill="#09090b" stroke="#22d3ee" stroke-width="3"/>
  <!-- Inner diamond -->
  <path d="M100 30 L165 80 L100 170 L35 80Z" fill="none" stroke="#0e7490" stroke-width="1.5"/>
  <!-- Cross pattern -->
  <line x1="100" y1="30" x2="100" y2="170" stroke="#0e7490" stroke-width="1" opacity="0.4"/>
  <line x1="35" y1="80" x2="165" y2="80" stroke="#0e7490" stroke-width="1" opacity="0.4"/>
  <!-- AI text -->
  <text x="100" y="90" text-anchor="middle" font-family="'Inter',Arial,sans-serif" font-size="32" font-weight="900" fill="#22d3ee">AI</text>
  <!-- Dot separator -->
  <circle cx="100" cy="100" r="2" fill="#22d3ee"/>
</svg>
