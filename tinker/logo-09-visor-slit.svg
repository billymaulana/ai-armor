<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Minimalist visor/eye slit -->
  <rect x="20" y="20" width="160" height="160" rx="20" fill="#09090b" stroke="#0e7490" stroke-width="2"/>
  <!-- Visor shape -->
  <path d="M40 90 L160 90 L155 115 L45 115Z" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
  <!-- Glowing eyes -->
  <ellipse cx="80" cy="102" rx="18" ry="7" fill="#22d3ee" opacity="0.9"/>
  <ellipse cx="120" cy="102" rx="18" ry="7" fill="#22d3ee" opacity="0.9"/>
  <!-- Eye pupils -->
  <ellipse cx="80" cy="102" rx="6" ry="5" fill="#fff" opacity="0.5"/>
  <ellipse cx="120" cy="102" rx="6" ry="5" fill="#fff" opacity="0.5"/>
  <!-- Nose bridge -->
  <line x1="100" y1="88" x2="100" y2="117" stroke="#0e7490" stroke-width="2"/>
</svg>
