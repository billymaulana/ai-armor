           L44 56
           L38 90
           L42 110
           L50 124
           L50 166
           L66 174
           L76 166
           L76 148
           L82 140
           L82 174
           L118 174
           L118 140
           L124 148
           L124 166
           L134 174
           L150 166
           L150 124
           L158 110
           L162 90
           L156 56
           L140 24Z"
