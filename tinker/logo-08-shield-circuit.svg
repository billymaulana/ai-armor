  <path d="M100 50 L70 150 L78 150 L86 118 L114 118 L122 150 L130 150 L100 50Z M90 108 L100 70 L110 108Z" fill="#22d3ee" fill-rule="evenodd"/>
  <!-- Horizontal PCB traces -->
  <line x1="40" y1="70" x2="68" y2="70" stroke="#0e7490" stroke-width="1.5"/>
  <line x1="132" y1="70" x2="160" y2="70" stroke="#0e7490" stroke-width="1.5"/>
  <line x1="45" y1="130" x2="66" y2="130" stroke="#0e7490" stroke-width="1.5"/>
  <line x1="134" y1="130" x2="155" y2="130" stroke="#0e7490" stroke-width="1.5"/>
  <!-- PCB pads -->
  <circle cx="68" cy="70" r="3" fill="#0e7490"/>
  <circle cx="132" cy="70" r="3" fill="#0e7490"/>
  <circle cx="66" cy="130" r="3" fill="#0e7490"/>
  <circle cx="134" cy="130" r="3" fill="#0e7490"/>
</svg>
