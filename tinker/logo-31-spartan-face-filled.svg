<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Spartan helmet — filled solid, strong silhouette -->
  <!-- The shape itself IS the logo, no added decoration -->
  <!-- Full helmet shape -->
  <path d="M100 10
           C60 10 36 38 32 70
           L30 98
           C28 116 34 132 46 140
           L46 168
           C46 176 52 184 62 184
           L72 184
           L72 152
           L78 144
           L78 184
           L122 184
           L122 144
           L128 152
           L128 184
           L138 184
           C148 184 154 176 154 168
           L154 140
           C166 132 172 116 170 98
           L168 70
           C164 38 140 10 100 10Z"
        fill="#22d3ee"/>
  <!-- Crest -->
  <rect x="90" y="2" width="20" height="14" rx="8" fill="#22d3ee"/>
  <!-- T-visor cutout (negative space) -->
  <rect x="38" y="82" width="124" height="18" rx="2" fill="#09090b"/>
  <rect x="92" y="68" width="16" height="38" rx="2" fill="#09090b"/>
  <!-- Eye glow (inside dark visor) -->
  <ellipse cx="68" cy="91" rx="16" ry="5" fill="#0e7490" opacity="0.6"/>
  <ellipse cx="132" cy="91" rx="16" ry="5" fill="#0e7490" opacity="0.6"/>
  <!-- Cheek line detail -->
  <path d="M46 108 L46 140" stroke="#0e7490" stroke-width="1.5" opacity="0.4"/>
  <path d="M154 108 L154 140" stroke="#0e7490" stroke-width="1.5" opacity="0.4"/>
  <!-- Chin split -->
  <line x1="100" y1="150" x2="100" y2="184" stroke="#09090b" stroke-width="2"/>
</svg>
