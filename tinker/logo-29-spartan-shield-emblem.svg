<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Shield shape (pointed bottom) with Spartan helmet silhouette inside -->
  <!-- Outer shield -->
  <path d="M100 8 C68 8 36 18 20 28 L28 142 C34 170 62 190 100 206 C138 190 166 170 172 142 L180 28 C164 18 132 8 100 8Z"
        fill="#09090b" stroke="#22d3ee" stroke-width="3"/>
  <!-- Spartan helmet silhouette (negative space / overlay) -->
  <!-- Dome -->
  <path d="M100 38
           C78 38 62 52 58 72
           L56 90
           L144 86
           L142 72
           C138 52 122 38 100 38Z"
        fill="#0f172a"/>
  <!-- Crest -->
  <rect x="92" y="28" width="16" height="16" rx="6" fill="#22d3ee"/>
  <!-- Visor slit -->
  <path d="M60 84 L140 82 L138 96 L62 98Z" fill="#22d3ee" opacity="0.15"/>
  <!-- Glowing eyes -->
  <ellipse cx="82" cy="90" rx="10" ry="4" fill="#22d3ee"/>
  <ellipse cx="118" cy="89" rx="10" ry="4" fill="#22d3ee"/>
  <!-- Nose -->
  <line x1="100" y1="80" x2="100" y2="100" stroke="#0e7490" stroke-width="2.5"/>
  <!-- Face plate / jaw -->
  <path d="M66 100 L66 130 C66 148 80 158 100 162 C120 158 134 148 134 130 L134 100"
        fill="#0f172a" stroke="#0e7490" stroke-width="1"/>
  <!-- Mouth grill lines -->
  <line x1="80" y1="115" x2="120" y2="115" stroke="#0e7490" stroke-width="1.5"/>
  <line x1="78" y1="122" x2="122" y2="122" stroke="#0e7490" stroke-width="1.5"/>
  <line x1="80" y1="129" x2="120" y2="129" stroke="#0e7490" stroke-width="1.5"/>
  <line x1="84" y1="136" x2="116" y2="136" stroke="#0e7490" stroke-width="1"/>
</svg>
