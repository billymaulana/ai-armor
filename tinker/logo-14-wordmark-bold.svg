<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- AI ARMOR wordmark -->
  <!-- Top line -->
  <text x="100" y="78" text-anchor="middle" font-family="'Inter',Arial,sans-serif" font-size="28" font-weight="900" letter-spacing="8" fill="#22d3ee">AI</text>
  <!-- Divider -->
  <line x1="40" y1="90" x2="160" y2="90" stroke="#0e7490" stroke-width="2"/>
  <!-- Bottom line -->
  <text x="100" y="125" text-anchor="middle" font-family="'Inter',Arial,sans-serif" font-size="28" font-weight="900" letter-spacing="5" fill="#22d3ee">ARMOR</text>
  <!-- Subtle border -->
  <rect x="25" y="40" width="150" height="120" rx="8" fill="none" stroke="#0e7490" stroke-width="1.5"/>
  <!-- Corner accents -->
  <line x1="25" y1="55" x2="35" y2="55" stroke="#22d3ee" stroke-width="2"/>
  <line x1="25" y1="40" x2="25" y2="55" stroke="#22d3ee" stroke-width="2"/>
  <line x1="165" y1="145" x2="175" y2="145" stroke="#22d3ee" stroke-width="2"/>
  <line x1="175" y1="145" x2="175" y2="160" stroke="#22d3ee" stroke-width="2"/>
</svg>
